<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Envelope - Upload Memories</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #cba87c;
            /* Soft gold */
            --primary-hover: #b89569;
            --text-main: #2c2c2c;
            --text-muted: #666666;
            --bg-color: #fcf9f6;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            /* Elegant subtle floral/wedding background image */
            background-image: url('https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 600;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafa;
            resize: vertical;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(203, 168, 124, 0.2);
            background: #fff;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        .btn-custom-file {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 1rem;
            background: #fafafa;
            border: 2px dashed #d1d1d1;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-upload-wrapper:hover .btn-custom-file {
            border-color: var(--primary);
            background: rgba(203, 168, 124, 0.05);
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(203, 168, 124, 0.3);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(203, 168, 124, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Loading Overlay for Uploads */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 10;
            border-radius: 20px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(203, 168, 124, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .progress-container {
            width: 80%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-top: 1.5rem;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .percentage {
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 5px;
            font-weight: 600;
            display: none;
        }

        .upload-status-text {
            font-weight: 500;
            color: var(--primary);
            margin-top: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="overlay"></div>
    <div class="container">
        <!-- Loading state overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p class="upload-status-text" id="statusText">Uploading your memories...</p>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="percentage" id="percentageText">0%</p>
        </div>

        <h1>Himanshu weds Namrata</h1>
        <p class="subtitle">Upload photos and videos to our wedding album</p>

        <form method="post" enctype="multipart/form-data" id="uploadForm">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.guest_name.id_for_label }}">Your Name</label>
                {{ form.guest_name }}
            </div>

            <div class="form-group">
                <label for="{{ form.message.id_for_label }}">Message for the Couple</label>
                {{ form.message }}
            </div>

            <div class="form-group">
                <label>Select Photos & Videos <span
                        style="font-size: 0.8rem; font-weight: 400; color: var(--text-muted);">(Max 100
                        files)</span></label>
                <div class="file-upload-wrapper">
                    <div class="btn-custom-file">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span>Choose files to upload...</span>
                    </div>
                    <input type="file" name="file" multiple required id="fileInput">
                </div>
            </div>

            <button type="submit" class="btn-submit">Upload to Album</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const fileInput = document.getElementById('fileInput');
            const fileLabel = document.querySelector('.btn-custom-file span');
            const form = document.getElementById('uploadForm');
            const overlay = document.getElementById('loadingOverlay');

            fileInput.addEventListener('change', function (e) {
                const count = e.target.files.length;

                if (count > 100) {
                    alert('You can only select up to 100 files at a time. Please select fewer files.');
                    e.target.value = ''; // Reset the input
                    fileLabel.textContent = 'Choose files to upload...';
                    fileLabel.style.color = 'var(--text-muted)';
                    fileLabel.style.fontWeight = 'normal';
                    return;
                }

                if (count > 1) {
                    fileLabel.textContent = count + ' files selected';
                    fileLabel.style.color = 'var(--text-main)';
                    fileLabel.style.fontWeight = '500';
                } else if (count === 1) {
                    fileLabel.textContent = e.target.files[0].name;
                    fileLabel.style.color = 'var(--text-main)';
                    fileLabel.style.fontWeight = '500';
                } else {
                    fileLabel.textContent = 'Choose files to upload...';
                    fileLabel.style.color = 'var(--text-muted)';
                    fileLabel.style.fontWeight = 'normal';
                }
            });

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const guestName = document.querySelector('input[name="guest_name"]').value.trim();
                const message = document.querySelector('textarea[name="message"]').value.trim();
                const files = fileInput.files;

                if (!guestName || files.length === 0) return;

                // Show overlay and initial status
                overlay.style.display = 'flex';
                document.getElementById('progressContainer').style.display = 'block';
                document.getElementById('percentageText').style.display = 'block';
                const statusText = document.getElementById('statusText');
                const progressBar = document.getElementById('progressBar');
                const percentageText = document.getElementById('percentageText');

                try {
                    // 1. Initiate Upload (Create Folder)
                    statusText.textContent = "Creating your unique album folder...";
                    const initData = new FormData();
                    initData.append('initiate', '1');
                    initData.append('guest_name', guestName);
                    initData.append('message', message);
                    initData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

                    const initResponse = await fetch('', {
                        method: 'POST',
                        body: initData,
                        headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    });
                    const initResult = await initResponse.json();

                    if (!initResult.success) {
                        throw new Error(initResult.error || 'Failed to initialize upload.');
                    }

                    const folderId = initResult.folder_id;
                    const totalFiles = files.length;

                    // 2. Upload Files Sequentially
                    for (let i = 0; i < totalFiles; i++) {
                        const file = files[i];
                        statusText.textContent = `Uploading file ${i + 1} of ${totalFiles}...`;

                        const fileData = new FormData();
                        fileData.append('folder_id', folderId);
                        fileData.append('file', file);
                        fileData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

                        const uploadResponse = await fetch('', {
                            method: 'POST',
                            body: fileData,
                            headers: { 'X-Requested-With': 'XMLHttpRequest' }
                        });
                        const uploadResult = await uploadResponse.json();

                        if (!uploadResult.success) {
                            throw new Error(`Failed to upload ${file.name}: ${uploadResult.error}`);
                        }

                        // Update progress bar
                        const percentComplete = Math.round(((i + 1) / totalFiles) * 100);
                        progressBar.style.width = percentComplete + '%';
                        percentageText.textContent = percentComplete + '%';
                    }

                    // 3. Success!
                    statusText.textContent = "All memories saved! Redirecting...";
                    window.location.href = '{% url "upload" %}?success=1&name=' + encodeURIComponent(guestName);

                } catch (error) {
                    console.error('Upload Error:', error);
                    alert('Error: ' + error.message);
                    overlay.style.display = 'none';
                }
            });
        });
    </script>
</body>

</html>
